<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notif Torture 3000</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0a;
    --card: #111;
    --border: #222;
    --yellow: #f5e642;
    --red: #ff3c3c;
    --green: #3cffa0;
    --text: #e0e0e0;
    --muted: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    width: 100%;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 5.5rem);
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--yellow);
    text-shadow: 4px 4px 0 #3a3800;
    margin-bottom: 0.2rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--yellow), transparent);
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .dot.denied { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #status-text {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 1rem 1.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-enable {
    background: var(--yellow);
    color: #000;
  }
  .btn-enable:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,230,66,0.3); }
  .btn-enable:active { transform: translateY(0); }
  .btn-enable:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-test {
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green);
    margin-top: 0.75rem;
  }
  .btn-test:hover { background: rgba(60,255,160,0.08); }
  .btn-test:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-stop {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    margin-top: 0.75rem;
  }
  .btn-stop:hover { background: rgba(255,60,60,0.08); }
  .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }

  .log-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
  }

  .log-title {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  #log {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    max-height: 180px;
    overflow-y: auto;
  }

  #log li {
    font-size: 0.7rem;
    color: var(--muted);
    padding: 0.4rem 0.6rem;
    background: rgba(255,255,255,0.02);
    border-left: 2px solid var(--border);
    border-radius: 2px;
    animation: fadeIn 0.3s ease;
  }

  #log li.ok { border-color: var(--green); color: var(--green); }
  #log li.err { border-color: var(--red); color: var(--red); }
  #log li.info { border-color: var(--yellow); color: var(--yellow); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-6px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .timer-badge {
    display: inline-block;
    margin-top: 1rem;
    padding: 0.3rem 0.8rem;
    background: rgba(245,230,66,0.08);
    border: 1px solid rgba(245,230,66,0.2);
    border-radius: 2px;
    font-size: 0.65rem;
    color: var(--yellow);
    letter-spacing: 0.15em;
  }

  #timer-display { display: none; }

  .footer {
    margin-top: 1.5rem;
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.1em;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="container">
  <div class="title">Notif<br>Torture</div>
  <div class="subtitle">// testeur de notifications &mdash; v3000</div>

  <div class="card">
    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span id="status-text">PERMISSION : EN ATTENTE DE TOI</span>
    </div>

    <button class="btn btn-enable" id="btn-enable" onclick="activerNotifs()">
      ⚡ Activer les notifications
    </button>
    <button class="btn btn-test" id="btn-test" onclick="envoyerNotif()" disabled>
      🔔 Envoyer une notif maintenant
    </button>
    <button class="btn btn-stop" id="btn-stop" onclick="stopTimer()" disabled>
      🛑 Stopper le déluge
    </button>

    <div id="timer-display">
      <div class="timer-badge" id="timer-badge">⏱ Prochaine notif dans <span id="countdown">60</span>s</div>
    </div>
  </div>

  <div class="log-section">
    <div class="log-title">// journal des événements</div>
    <ul id="log"></ul>
  </div>

  <div class="footer">
    fonctionne en local &bull; pas de serveur requis &bull; chrome/firefox/edge<br>
    ferme l'onglet pour arrêter (ou clique sur stopper, t'as le choix)
  </div>
</div>

<script>
const messages = [
  "🍕 Arrête ce que tu fais. La pizza refroidit. AGIS.",
  "👁️ Quelqu'un quelque part pense à toi en ce moment. Bizarre hein.",
  "🧠 Rappel : tu n'as pas bu d'eau depuis trop longtemps. Hydrate-toi, sac à viande.",
  "🐧 Un pingouin quelque part te regarde. Il est déçu.",
  "🔥 Alerte : ton niveau de productivité vient d'atteindre un nouveau creux historique.",
  "🛸 Les extraterrestres ont observé la Terre. Ils ont décidé de ne pas faire contact. C'est à cause de toi.",
  "😴 Tu clignotes des yeux un peu trop lentement. Dors ou agis, arrête le flou artistique.",
  "🧦 Ta chaussette gauche est légèrement plus serrée que la droite. T'y avais pas pensé hein.",
  "📉 Mise à jour de ton karma : -3 points. Raison : existence générale.",
  "🐈 Un chat quelque part t'a jugé et trouvé insuffisant.",
  "☕ Le café froid est une métaphore de ta vie. Réfléchis-y.",
  "🌍 La Terre a tourné de 1700 km depuis que t'as ouvert cet onglet. T'as rien fait.",
  "🤖 Je suis une notification. Tu es humain. L'un de nous deux a un but dans la vie.",
  "🧻 Vérifie le papier toilette avant d'en avoir besoin. C'est gratuit comme conseil.",
  "💀 Reminder : t'es mortel. Profite. Ou pas. Comme tu veux.",
];

let timerInterval = null;
let countdownInterval = null;
let secondsLeft = 60;

function log(msg, type = '') {
  const li = document.createElement('li');
  li.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  if (type) li.classList.add(type);
  const ul = document.getElementById('log');
  ul.prepend(li);
}

function setStatus(text, state) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('dot');
  dot.className = 'dot ' + (state || '');
}

async function activerNotifs() {
  if (!('Notification' in window)) {
    log('Ton navigateur ne supporte pas les notifications. Bravo.', 'err');
    return;
  }

  log('Demande de permission en cours...', 'info');
  const perm = await Notification.requestPermission();

  if (perm === 'granted') {
    setStatus('PERMISSION : ACCORDÉE — LE DÉLUGE COMMENCE', 'active');
    document.getElementById('btn-enable').disabled = true;
    document.getElementById('btn-test').disabled = false;
    document.getElementById('btn-stop').disabled = false;
    log('Permission accordée. Tu l\'as voulu.', 'ok');
    demarrerTimer();
    envoyerNotif();
  } else if (perm === 'denied') {
    setStatus('PERMISSION : REFUSÉE — LÂCHE', 'denied');
    log('Refus de permission. Typique.', 'err');
  } else {
    log('Permission ignorée. Classique.', 'err');
  }
}

function envoyerNotif() {
  if (Notification.permission !== 'granted') return;
  const msg = messages[Math.floor(Math.random() * messages.length)];
  new Notification('Notif Torture 3000', {
    body: msg,
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔔</text></svg>'
  });
  log(`Notif envoyée : "${msg.slice(0, 50)}..."`, 'ok');
}

function demarrerTimer() {
  secondsLeft = 60;
  document.getElementById('timer-display').style.display = 'block';
  updateCountdown();

  countdownInterval = setInterval(() => {
    secondsLeft--;
    updateCountdown();
    if (secondsLeft <= 0) secondsLeft = 60;
  }, 1000);

  timerInterval = setInterval(() => {
    envoyerNotif();
    secondsLeft = 60;
  }, 60000);
}

function updateCountdown() {
  document.getElementById('countdown').textContent = secondsLeft;
}

function stopTimer() {
  clearInterval(timerInterval);
  clearInterval(countdownInterval);
  timerInterval = null;
  document.getElementById('timer-display').style.display = 'none';
  document.getElementById('btn-stop').disabled = true;
  setStatus('PERMISSION : ACCORDÉE — TIMER ARRÊTÉ', 'active');
  log('Timer stoppé. Le silence est d\'or.', 'info');
}

// Vérifie l'état actuel au chargement
if (Notification.permission === 'granted') {
  setStatus('PERMISSION DÉJÀ ACCORDÉE — CLIQUE POUR DÉMARRER', 'active');
  document.getElementById('btn-enable').textContent = '▶ Démarrer le déluge';
  document.getElementById('btn-test').disabled = false;
}
</script>
</body>
</html>
